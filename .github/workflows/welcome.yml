name: Post welcome comment
on:
  pull_request:
    types: [opened]
permissions:
  pull-requests: write
jobs:
  welcome:
    name: "A welcome message"
    runs-on: ubuntu-latest
    steps:
      - run: gh pr "$PR_URL" --body "Welcome to the repository"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
